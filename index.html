<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎉 파티룸·펜션 게임 모음</title>
    <meta name="description" content="파티룸·펜션에서 바로 쓰는 게임 룰북 + 라이브 진행 도구 (마피아 배정, 라이어게임, 룰렛, 랜덤뽑기)">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎉</text></svg>">
    <style>
        :root {
            --bg: #0d1117;
            --bg-elev: #161b22;
            --bg-hover: #1c2230;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --accent: #a371f7;
            --accent2: #2f81f7;
            --accent-soft: rgba(163, 113, 247, 0.15);
            --green: #3fb950;
            --red: #f85149;
            --yellow: #d29922;
            --radius: 14px;
            --shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f6f8fa;
                --bg-elev: #ffffff;
                --bg-hover: #f0f3f6;
                --border: #d0d7de;
                --text: #1f2328;
                --text-dim: #636c76;
                --accent: #8250df;
                --accent2: #0969da;
                --accent-soft: rgba(130, 80, 223, 0.1);
                --green: #1a7f37;
                --red: #cf222e;
                --yellow: #9a6700;
                --shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
                "Noto Sans KR", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.55;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        .wrap { max-width: 1000px; margin: 0 auto; padding: 32px 16px 80px; }

        .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .home-link { color: var(--text-dim); text-decoration: none; font-size: 0.85rem; }
        .home-link:hover { color: var(--accent); }

        header h1 {
            font-size: clamp(1.6rem, 5vw, 2.3rem);
            letter-spacing: -0.02em;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 8px;
        }
        header p { color: var(--text-dim); margin-top: 6px; font-size: 0.95rem; }

        .tabs { display: flex; gap: 8px; margin: 24px 0; border-bottom: 1px solid var(--border); }
        .tab {
            padding: 10px 18px; font-size: 0.95rem; font-weight: 600; cursor: pointer;
            color: var(--text-dim); background: none; border: none; border-bottom: 2px solid transparent;
            margin-bottom: -1px; transition: color 0.15s, border-color 0.15s;
        }
        .tab.active { color: var(--accent); border-color: var(--accent); }
        .tab:hover { color: var(--text); }

        .panel { display: none; }
        .panel.active { display: block; animation: fade 0.25s ease; }
        @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }

        .card {
            background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 18px; cursor: pointer; transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
            display: flex; flex-direction: column; gap: 8px;
        }
        .card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: var(--shadow); }
        .card .emoji { font-size: 2rem; }
        .card h3 { font-size: 1.1rem; }
        .card .sum { color: var(--text-dim); font-size: 0.85rem; flex: 1; }
        .badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
        .badge {
            font-size: 0.72rem; padding: 3px 8px; border-radius: 999px;
            background: var(--accent-soft); color: var(--accent); font-weight: 600;
        }
        .badge.lv1 { background: rgba(63,185,80,.15); color: var(--green); }
        .badge.lv2 { background: rgba(210,153,34,.15); color: var(--yellow); }
        .badge.lv3 { background: rgba(248,81,73,.15); color: var(--red); }

        /* modal */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(3px);
            display: none; align-items: flex-start; justify-content: center; z-index: 50;
            padding: 24px 16px; overflow-y: auto;
        }
        .overlay.open { display: flex; }
        .modal {
            background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius);
            max-width: 560px; width: 100%; padding: 26px; box-shadow: var(--shadow);
            animation: pop 0.2s ease; margin: auto;
        }
        @keyframes pop { from { transform: scale(.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
        .modal-head h2 { font-size: 1.4rem; display: flex; align-items: center; gap: 10px; }
        .close { background: none; border: none; color: var(--text-dim); font-size: 1.6rem; cursor: pointer; line-height: 1; }
        .close:hover { color: var(--text); }
        .modal h4 { margin: 16px 0 6px; font-size: 0.95rem; color: var(--accent); }
        .modal ol, .modal ul { padding-left: 22px; }
        .modal li { margin: 5px 0; }
        .modal .tip { background: var(--bg); border-left: 3px solid var(--yellow); padding: 10px 14px; border-radius: 8px; margin-top: 14px; font-size: 0.9rem; color: var(--text-dim); }

        /* tool controls */
        .field { margin: 12px 0; }
        .field label { display: block; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 6px; }
        input[type=text], input[type=number], textarea, select {
            width: 100%; padding: 10px 12px; font-size: 1rem; color: var(--text);
            background: var(--bg); border: 1px solid var(--border); border-radius: 10px; outline: none;
            font-family: inherit;
        }
        input:focus, textarea:focus, select:focus { border-color: var(--accent); }
        textarea { resize: vertical; min-height: 90px; }
        .row { display: flex; gap: 10px; }
        .row > * { flex: 1; }

        .btn {
            padding: 12px 18px; font-size: 1rem; font-weight: 600; border-radius: 10px; cursor: pointer;
            border: 1px solid var(--border); background: var(--bg-elev); color: var(--text);
            transition: background .15s, opacity .15s; width: 100%;
        }
        .btn.primary { background: linear-gradient(90deg, var(--accent), var(--accent2)); color: #fff; border: none; }
        .btn.primary:hover { opacity: .9; }
        .btn.ghost:hover { background: var(--bg-hover); }
        .btn-row { display: flex; gap: 10px; margin-top: 14px; }

        .result {
            margin-top: 18px; padding: 18px; border-radius: 12px; background: var(--bg);
            border: 1px solid var(--border); text-align: center; min-height: 40px;
        }
        .pick-big { font-size: 1.8rem; font-weight: 800; color: var(--accent); }
        .chip-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .chip { padding: 6px 12px; background: var(--accent-soft); color: var(--accent); border-radius: 999px; font-weight: 600; }

        /* roulette */
        .wheel-wrap { position: relative; width: 260px; height: 260px; margin: 10px auto; }
        .wheel { width: 100%; height: 100%; border-radius: 50%; transition: transform 4s cubic-bezier(.17,.67,.16,.99); border: 4px solid var(--border); }
        .pointer { position: absolute; top: -6px; left: 50%; transform: translateX(-50%); font-size: 1.8rem; z-index: 2; }

        /* pass-the-phone reveal */
        .reveal-card {
            margin-top: 16px; padding: 40px 20px; border-radius: 14px; text-align: center; cursor: pointer;
            background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; user-select: none;
        }
        .reveal-card .who { font-size: 1.1rem; opacity: .9; }
        .reveal-card .role { font-size: 2rem; font-weight: 800; margin: 8px 0; }
        .reveal-card .hint { font-size: .9rem; opacity: .85; }
        .reveal-card.hidden-state { background: var(--bg); color: var(--text); border: 2px dashed var(--border); }

        /* balance game */
        .bal-opt {
            padding: 24px 18px; border-radius: 14px; font-size: 1.2rem; font-weight: 700;
            text-align: center; cursor: pointer; border: 2px solid var(--border); background: var(--bg);
            transition: transform .12s, border-color .12s, background .12s;
        }
        .bal-a:hover { border-color: var(--accent2); }
        .bal-b:hover { border-color: var(--accent); }
        .bal-opt.sel { transform: scale(1.02); }
        .bal-a.sel { border-color: var(--accent2); background: rgba(47,129,247,.14); }
        .bal-b.sel { border-color: var(--accent); background: var(--accent-soft); }
        .bal-vs { text-align: center; font-weight: 800; color: var(--text-dim); margin: 10px 0; letter-spacing: 1px; }

        footer { margin-top: 40px; text-align: center; color: var(--text-dim); font-size: 0.82rem; }
        footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>

                <label>이름·항목 (한 줄에 하나 또는 쉼표로 구분)</label>
                <textarea id="pk-in" placeholder="철수\n영희\n민수\n지은"></textarea>
            </div>
            <div class="field">
                <label>모드</label>
                <select id="pk-mode">
                    <option value="one">당첨자 1명 뽑기</option>

            <div class="btn-row">
                <button class="btn primary" onclick="runPicker()">뽑기 🎲</button>
            </div>
            <div class="result" id="pk-res">결과가 여기에 표시됩니다</div>`);
        document.getElementById("pk-mode").onchange = e => {
            document.getElementById("pk-team-wrap").style.display = e.target.value === "teams" ? "block" : "none";
        };
    }
    function parseNames(s){
        return s.split(/[\n,]+/).map(x => x.trim()).filter(Boolean);
    }
    function runPicker(){
        const names = parseNames(document.getElementById("pk-in").value);
        const res = document.getElementById("pk-res");
        if (names.length < 2){ res.innerHTML = "<span style='color:var(--red)'>2명 이상 입력하세요</span>"; return; }
        const mode = document.getElementById("pk-mode").value;
        const sh = shuffle([...names]);
        if (mode === "one"){
            res.innerHTML = `<div class="pick-big">🎉 ${sh[0]}</div>`;
        } else if (mode === "order"){
            res.innerHTML = `<div class="chip-list">${sh.map((n,i) => `<span class="chip">${i+1}. ${n}</span>`).join("")}</div>`;
        } else {
            const t = Math.max(2, Math.min(10, +document.getElementById("pk-teams").value || 2));
            const teams = Array.from({length:t}, () => []);
            sh.forEach((n,i) => teams[i % t].push(n));
            res.innerHTML = teams.map((tm,i) =>
                `<div style="margin:8px 0"><strong style="color:var(--accent)">${i+1}팀</strong><div class="chip-list">${tm.map(n=>`<span class="chip">${n}</span>`).join("")}</div></div>`).join("");
        }
    }

    // ── 룰렛 ──
    function toolRoulette(){
        openModal(`${head("🎡","벌칙 룰렛")}
            <div class="field">
                <label>항목 (한 줄에 하나)</label>
                <textarea id="rl-in" placeholder="설거지\n노래 한 곡\n애교\n통과\n물 한 컵\n팔굽혀펴기 10개"></textarea>
            </div>
            <div class="btn-row"><button class="btn ghost" onclick="buildWheel()">룰렛 만들기</button></div>
            <div id="rl-stage"></div>`);
    }
    let rlItems = [], rlAngle = 0;
    function buildWheel(){
        rlItems = parseNames(document.getElementById("rl-in").value);
        if (rlItems.length < 2){ document.getElementById("rl-stage").innerHTML = "<div class='result' style='color:var(--red)'>2개 이상 입력하세요</div>"; return; }
        const colors = ["#a371f7","#2f81f7","#3fb950","#d29922","#f85149","#db61a2","#1abc9c","#e67e22"];
        const n = rlItems.length, seg = 360 / n;
        let grad = rlItems.map((_,i) => `${colors[i%colors.length]} ${i*seg}deg ${(i+1)*seg}deg`).join(",");
        const labels = rlItems.map((it,i) => {
            const a = i*seg + seg/2;
            return `<div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) rotate(${a}deg) translateY(-90px) rotate(${-a}deg);font-size:.75rem;font-weight:700;color:#fff;max-width:70px;text-align:center;text-shadow:0 1px 2px rgba(0,0,0,.5)">${it}</div>`;
        }).join("");
        document.getElementById("rl-stage").innerHTML = `
            <div class="wheel-wrap">
                <div class="pointer">🔻</div>
                <div class="wheel" id="rl-wheel" style="background:conic-gradient(${grad})">${labels}</div>
            </div>
            <div class="btn-row"><button class="btn primary" onclick="spinWheel()">돌리기 🎡</button></div>
            <div class="result" id="rl-res">버튼을 눌러 돌리세요</div>`;
        rlAngle = 0;
    }
    function spinWheel(){
        const n = rlItems.length, seg = 360/n;
        const winner = Math.floor(Math.random()*n);
        const spins = 5 + Math.floor(Math.random()*3);
        // 포인터(상단)가 winner 중앙을 가리키도록
        const target = spins*360 + (360 - (winner*seg + seg/2));
        rlAngle = target;
        const wheel = document.getElementById("rl-wheel");
        wheel.style.transform = `rotate(${rlAngle}deg)`;
        const res = document.getElementById("rl-res");
        res.textContent = "두구두구…";
        setTimeout(() => { res.innerHTML = `<div class="pick-big">🎯 ${rlItems[winner]}</div>`; }, 4100);
    }

    function startLiar(){
        const total = +document.getElementById("lr-total").value;
        const liars = +document.getElementById("lr-liars").value;
        const cat = document.getElementById("lr-cat").value;
        const hint = document.getElementById("lr-hint").checked;

            document.getElementById("lr-stage").innerHTML = "<div class='result' style='color:var(--red)'>라이어 수는 1명 이상, 총 인원보다 적어야 합니다</div>"; return;
        }
        const word = pick(LIAR_DECKS[cat]);
        let arr = [];
        for (let i=0;i<liars;i++) arr.push({role:"🤥 라이어", emoji:"🎭",
            word: hint ? `당신은 라이어! (힌트: ${cat})` : "당신은 라이어!",
            hint:"제시어를 모릅니다. 들키지 말고 추리하세요"});
        while (arr.length < total) arr.push({role:"시민", emoji:"🙂", word:`제시어: ${word}`, hint:`카테고리: ${cat}`});
        revealQueue = shuffle(arr);
        startReveal("플레이어", true);
    }

    // ── pass-the-phone 공통 reveal ──
    function startReveal(who, isLiar){
        revealIdx = 0; revealShown = false;
        renderReveal(who, isLiar);
    }
    function renderReveal(who, isLiar){
        const stageId = isLiar ? "lr-stage" : "mf-stage";
        const stage = document.getElementById(stageId);
        if (revealIdx >= revealQueue.length){
            stage.innerHTML = `<div class="result"><div class="pick-big">✅ 배정 완료!</div><div style="color:var(--text-dim);margin-top:6px">게임을 시작하세요</div></div>`;
            return;
        }
        const item = revealQueue[revealIdx];
        if (!revealShown){
            stage.innerHTML = `<div class="reveal-card hidden-state" onclick="flipReveal('${who}',${!!isLiar})">
                <div class="who">${who} ${revealIdx+1} / ${revealQueue.length}</div>
                <div class="role">📱 탭해서 확인</div>
                <div class="hint">남에게 보이지 않게!</div></div>`;
        } else {
            const main = isLiar ? item.word : item.role;
            const sub = item.hint || "";
            stage.innerHTML = `<div class="reveal-card" onclick="nextReveal('${who}',${!!isLiar})">
                <div class="who">${item.emoji} ${isLiar ? item.role : ""}</div>
                <div class="role">${main}</div>
                <div class="hint">${sub}<br><br>👉 탭해서 다음 사람에게 넘기기</div></div>`;
        }
    }
    function flipReveal(who, isLiar){ revealShown = true; renderReveal(who, isLiar); }
    function nextReveal(who, isLiar){ revealShown = false; revealIdx++; renderReveal(who, isLiar); }

    // ── 밸런스 게임 ──
    let balQueue = [], balIdx = 0;
    function toolBalance(){
        balQueue = shuffle([...BALANCE_Q]); balIdx = 0;
        openModal(`${head("⚖️","밸런스 게임")}
            <p style="color:var(--text-dim);font-size:.88rem;margin-bottom:6px">둘 중 하나만! 다같이 손가락으로 고르고 소수파는 해명 or 벌칙.</p>
            <div id="bal-stage"></div>`);
        renderBalance();
    }
    function renderBalance(){
        if (balIdx >= balQueue.length){ balQueue = shuffle([...BALANCE_Q]); balIdx = 0; }
        const q = balQueue[balIdx];
        document.getElementById("bal-stage").innerHTML = `
            <div style="text-align:center;color:var(--text-dim);font-size:.85rem;margin-bottom:12px">질문 ${balIdx+1} / ${balQueue.length}</div>
            <div class="bal-opt bal-a" onclick="pickBal(this)">${q[0]}</div>
            <div class="bal-vs">— VS —</div>
            <div class="bal-opt bal-b" onclick="pickBal(this)">${q[1]}</div>
            <div class="btn-row"><button class="btn primary" onclick="nextBal()">다음 질문 ▶</button></div>`;
    }
    function pickBal(elm){
        elm.parentElement.querySelectorAll(".bal-opt").forEach(o => o.classList.remove("sel"));
        elm.classList.add("sel");
    }
    function nextBal(){ balIdx++; renderBalance(); }

    // ── 제시어 / 질문 덱 ──
    function toolDeck(){
        openModal(`${head("🃏","제시어 / 질문 덱")}
            <div class="field"><label>덱 선택</label>
                <select id="dk-type" onchange="deckCatUpdate()">
                    <option value="gesture">🙆 몸으로 말해요</option>
                    <option value="chosung">🔤 초성 게임</option>
                    <option value="telepathy">🧠 텔레파시 주제</option>
                </select>
            </div>
            <div class="field" id="dk-cat-wrap"><label>카테고리</label><select id="dk-cat"></select></div>
            <div class="btn-row"><button class="btn primary" onclick="drawDeck()">뽑기 🃏</button></div>
            <div class="result" id="dk-res">버튼을 눌러 뽑으세요</div>`);
        deckCatUpdate();
    }
    function deckCatUpdate(){
        const t = document.getElementById("dk-type").value;
        const wrap = document.getElementById("dk-cat-wrap");
        const sel = document.getElementById("dk-cat");
        if (t === "gesture"){
            wrap.style.display = "block";
            sel.innerHTML = Object.keys(GESTURE_DECKS).map(c=>`<option>${c}</option>`).join("");
        } else { wrap.style.display = "none"; }
    }
    function drawDeck(){
        const t = document.getElementById("dk-type").value;
        const res = document.getElementById("dk-res");
        if (t === "gesture"){
            const cat = document.getElementById("dk-cat").value;
            res.innerHTML = `<div class="pick-big">${pick(GESTURE_DECKS[cat])}</div><div style="color:var(--text-dim)">${cat}</div>`;
        } else if (t === "chosung"){
            const w = pick(CHOSUNG_WORDS);
            res.innerHTML = `<div class="pick-big" style="letter-spacing:8px">${toChosung(w)}</div><div style="color:var(--text-dim);font-size:.8rem;margin-top:8px">정답 길이: ${w.length}글자</div>`;
        } else {
            res.innerHTML = `<div class="pick-big" style="font-size:1.3rem">${pick(TELEPATHY_Q)}</div>`;
        }
    }

    // ════════════════════════════════════════════════════════
    //  유틸
    // ════════════════════════════════════════════════════════
    function el(tag, cls){ const e = document.createElement(tag); if(cls) e.className = cls; return e; }
    function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
    function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
    const CHO = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
    function toChosung(str){
        return [...str].map(ch => {
            const code = ch.charCodeAt(0) - 0xAC00;
            if (code < 0 || code > 11171) return ch;
            return CHO[Math.floor(code / 588)];
        }).join("");
    }

    // ════════════════════════════════════════════════════════
    //  탭
    // ════════════════════════════════════════════════════════
    document.querySelectorAll(".tab").forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
            tab.classList.add("active");
            document.getElementById(tab.dataset.panel).classList.add("active");
        };
    });

    renderGrids();
    </script>
</body>

</html>
